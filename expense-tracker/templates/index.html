<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
</head>
<body>

<h1>Expense Tracker</h1>

<a href="/add">Add Expense</a>

<table border="1">
<tr>
<th>ID</th>
<th>Category</th>
<th>Amount</th>
<th>Description</th>
</tr>

{% for e in expenses %}
<tr>
<td>{{e[0]}}</td>
<td>{{e[1]}}</td>
<td>{{e[2]}}</td>
<td>{{e[3]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
